<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة رمضان الخير</title>
    <style>
        :root {
            --ramadan-gold: #d4af37;
            --ramadan-light: #f4e3ad;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('webpage.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container {
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 280px;
            margin: auto;
            text-align: center; 
            color: white;
            box-sizing: border-box;
        }

        h1 { font-size: 1.2rem; margin-bottom: 15px; }

        .input-group { text-align: right; margin-bottom: 15px; }

        label {
            display: block; margin-bottom: 8px;
            font-weight: bold; color: var(--ramadan-light); font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%; padding: 8px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 10px; background: rgba(255, 255, 255, 0.1);
            color: white; box-sizing: border-box; outline: none; font-size: 0.9rem;
        }

        .mcq-option {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.1); 
            margin-bottom: 10px; padding: 10px;
            border-radius: 10px; cursor: pointer;
            transition: 0.3s; border: 1px solid transparent;
            font-size: 0.9rem;
        }

        .mcq-option:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--ramadan-gold);
        }

        .mcq-option input { margin-left: 10px; }

        button {
            background: var(--ramadan-gold);
            color: #0f172a; border: none; padding: 12px;
            width: 100%; border-radius: 8px;
            font-weight: bold; font-size: 1rem;
            cursor: pointer; margin-top: 5px; transition: 0.3s;
        }

        button:hover {
            background: var(--ramadan-light);
            transform: translateY(-2px);
        }

        button:disabled { background: #888; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>فانوس الأسئلة 🌙</h1>
    
    <form id="ramadan-form">
        <div class="input-group">
            <label for="name">الاسم الكريم:</label>
            <input type="text" id="name" name="Username" placeholder="اكتب اسمك هنا..." required>
        </div>

        <div class="input-group">
            <label id="question-label"></label>
            <div id="options-container"></div>
        </div>

        <!-- حقل مخفي لإرسال الوقت -->
        <input type="hidden" name="Timestamp" id="timestamp">

        <button type="submit" id="submitBtn">إرسال الإجابة</button>
    </form>
    <p id="msg" style="margin-top: 15px; font-weight: bold; font-size: 0.8rem;"></p>
</div>

<script>

    const questions = [
    { q: "في بايثون، ما هي مخرجات الكود التالي: print(type([]))؟", options: ["<class 'list'>", "<class 'tuple'>", "<class 'dict'>"] },
    { q: "ما هو البروتوكول المسؤول عن نقل الملفات بشكل آمن في الشبكات؟", options: ["HTTP", "SFTP", "SNMP"] },
    { q: "في الأمن السيبراني، ماذا يسمى هجوم إغراق الخادم بالطلبات لتعطيله؟", options: ["Phishing", "DDoS", "SQL Injection"] },
    { q: "ما هو المكون المسؤول عن معالجة البيانات والعمليات الحسابية في الحاسوب؟", options: ["RAM", "CPU", "GPU"] },
    { q: "في تصميم مفاصل الركبة للأطراف الصناعية المتقدمة، أي نوع من أنظمة التحكم يُستخدم غالبًا لضبط مقاومة الحركة بشكل لحظي أثناء المشي؟", options: [" Open-loop control", " Passive mechanical damping", " Microprocessor-controlled system"] },
    { q: "أي من هذه اللغات تُعتبر لغة مفسرة (Interpreted) وليست مترجمة (Compiled)؟", options: ["C++", "Python", "Java"] },
    { q: "ما السوره التي ذكر فيها مصطلح علمي يتعلق بمراحل تكون الجنين؟", options: ["الرحمن", "المؤمنون", "النور"] },
    { q: "السوره التي ذكرت مراحل تشكل السحب ؟", options: ["الروم", "النور", "الملك"] },
    { q: "ما هي البترا في التاريخ الاسلامي ؟", options: ["الخطبة التي ليس فيها بسم الله", "الخطبة التي يلقيها القائد وهو على فرسه.", "الخطبة التي لا تبدأ بحمد الله."] },
    { q: "كلمة هي منتصف القران تماماً من حيث عدد الحروف، وتقع في سورة الكهف؟", options: [""ليتلطف"", ""نُكراً"", ""عجباً""] }
];

    const startDate = new Date("2026-02-26");
    startDate.setHours(0, 0, 0, 0);

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const diffTime = today.getTime() - startDate.getTime();
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    let qIndex = 0;
    if (diffDays >= 0) {
        qIndex = Math.floor(diffDays / 2) % questions.length;
    }

    const currentQ = questions[qIndex];

    document.getElementById('question-label').innerText = "سؤال اليوم: " + currentQ.q;

    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = currentQ.options.map(opt => `
        <label class="mcq-option">
            <input type="radio" name="UserAnswer" value="${opt}" required> ${opt}
        </label>
    `).join('');

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyFH8yBD-lwg6n760zbb-8XDRHhQ1u4jx-BWqMRk5vn6oTr4JecdbrIgX-mvKpuGYmW/exec';
    const form = document.getElementById('ramadan-form');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', e => {
        e.preventDefault();

        // إضافة التاريخ والوقت بصيغة دقيقة
        document.getElementById("timestamp").value = new Date().toISOString();

        btn.disabled = true;
        btn.innerHTML = "جاري الإرسال... ✨";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("تم استلام إجابتك بنجاح! رمضان كريم 🌙");
                msg.innerHTML = "✅ تم الإرسال بنجاح!";
                msg.style.color = "#d4af37";
                form.reset();
                btn.disabled = false;
                btn.innerHTML = "إرسال الإجابة";
            })
            .catch(error => {
                alert("حدث خطأ في الاتصال، حاول مرة أخرى.");
                btn.disabled = false;
                btn.innerHTML = "إرسال الإجابة";
            });
    });

</script>

</body>
</html>
