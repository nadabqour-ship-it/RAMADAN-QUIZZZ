<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة رمضان الخير</title>
    <style>
        :root {
            --ramadan-gold: #d4af37;
            --ramadan-light: #f4e3ad;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('webpage.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container {
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 280px;
            margin: auto;
            text-align: center; 
            color: white;
            box-sizing: border-box;
        }

        h1 { font-size: 1.2rem; margin-bottom: 15px; }

        .input-group { text-align: right; margin-bottom: 15px; }

        label {
            display: block; margin-bottom: 8px;
            font-weight: bold; color: var(--ramadan-light); font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%; padding: 8px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 10px; background: rgba(255, 255, 255, 0.1);
            color: white; box-sizing: border-box; outline: none; font-size: 0.9rem;
        }

        .mcq-option {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.1); 
            margin-bottom: 10px; padding: 10px;
            border-radius: 10px; cursor: pointer;
            transition: 0.3s; border: 1px solid transparent;
            font-size: 0.9rem;
        }

        .mcq-option:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--ramadan-gold);
        }

        .mcq-option input { margin-left: 10px; }

        button {
            background: var(--ramadan-gold);
            color: #0f172a; border: none; padding: 12px;
            width: 100%; border-radius: 8px;
            font-weight: bold; font-size: 1rem;
            cursor: pointer; margin-top: 5px; transition: 0.3s;
        }

        button:hover {
            background: var(--ramadan-light);
            transform: translateY(-2px);
        }

        button:disabled { background: #888; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>فانوس الأسئلة 🌙</h1>
    
    <form id="ramadan-form">
        <div class="input-group">
            <label for="name">الاسم الكريم:</label>
            <input type="text" id="name" name="Username" placeholder="اكتب اسمك هنا..." required>
        </div>

        <div class="input-group">
            <label id="question-label"></label>
            <div id="options-container"></div>
        </div>

        <!-- حقل مخفي لإرسال الوقت -->
        <input type="hidden" name="Timestamp" id="timestamp">

        <button type="submit" id="submitBtn">إرسال الإجابة</button>
    </form>
    <p id="msg" style="margin-top: 15px; font-weight: bold; font-size: 0.8rem;"></p>
</div>

<script>

    const questions = [
        { q: "نظام يعمل جيدا في المختبر لكنه يفشل في البيئه الحقيقيه .ما التفسير الاكثر احتمالا ؟", options: ["جودة تصنيع ضعيفه", "اختلاف ظروف التشغيل عن الافتراضات", "خطأ في المستخدم"] },
        { q: "في روبوت ,الحساس يعطي قيم ثابته رغم تغير البيئه .ما اول خطوه صحيحه؟", options: ["تجاهل المشكله و افتراض ان البيئه ثابته", "زيادة سرعة الروبوت", "التحقق من قراءة الحساس برمجيا و عتاديا"] },
        { q: "نظام يعمل جيدا عند الحمل المنخفض لكنه يضعف عند الحمل العالي , ما اول فرضيه يجب اختبارها ؟", options: ["ان النظام مثالي", "خطأ المستخدم ", "حدود القدره او التيار للمكونات "] },
        { q: "ما هي الغزوة التي وقعت في 17 رمضان؟", options: ["بدر", "أحد", "الخندق"] },
        { q: "من هو الصحابي الذي لُقب بسيف الله المسلول؟", options: ["خالد بن الوليد", "حمزة بن عبد المطلب", "عمر بن الخطاب"] },
        { q: "أين ورد ذكر ليلة القدر في القرآن الكريم؟", options: ["سورة القدر", "سورة البقرة", "سورة الإخلاص"] },
        { q: "ما هو اسم الباب الذي يدخل منه الصائمون الجنة؟", options: ["الريان", "القدس", "السلام"] },
        { q: "كم عدد سور القرآن الكريم؟", options: ["114 سورة", "110 سور", "120 سورة"] },
        { q: "من هو أول مؤذن في الإسلام؟", options: ["بلال بن رباح", "عمار بن ياسر", "أبو بكر الصديق"] },
        { q: "ما هي أطول سورة في القرآن الكريم؟", options: ["البقرة", "آل عمران", "النساء"] },
        { q: "كم سجدة تلاوة في القرآن الكريم؟", options: ["15 سجدة", "12 سجدة", "10 سجدات"] },
        { q: "من هو النبي الذي لُقب بـ 'كليم الله'؟", options: ["موسى عليه السلام", "عيسى عليه السلام", "إبراهيم عليه السلام"] }
    ];

    const startDate = new Date("2026-02-26");
    startDate.setHours(0, 0, 0, 0);

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const diffTime = today.getTime() - startDate.getTime();
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    let qIndex = 0;
    if (diffDays >= 0) {
        qIndex = Math.floor(diffDays / 2) % questions.length;
    }

    const currentQ = questions[qIndex];

    document.getElementById('question-label').innerText = "سؤال اليوم: " + currentQ.q;

    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = currentQ.options.map(opt => `
        <label class="mcq-option">
            <input type="radio" name="UserAnswer" value="${opt}" required> ${opt}
        </label>
    `).join('');

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyFH8yBD-lwg6n760zbb-8XDRHhQ1u4jx-BWqMRk5vn6oTr4JecdbrIgX-mvKpuGYmW/exec';
    const form = document.getElementById('ramadan-form');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', e => {
        e.preventDefault();

        // إضافة التاريخ والوقت بصيغة دقيقة
        document.getElementById("timestamp").value = new Date().toISOString();

        btn.disabled = true;
        btn.innerHTML = "جاري الإرسال... ✨";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("تم استلام إجابتك بنجاح! رمضان كريم 🌙");
                msg.innerHTML = "✅ تم الإرسال بنجاح!";
                msg.style.color = "#d4af37";
                form.reset();
                btn.disabled = false;
                btn.innerHTML = "إرسال الإجابة";
            })
            .catch(error => {
                alert("حدث خطأ في الاتصال، حاول مرة أخرى.");
                btn.disabled = false;
                btn.innerHTML = "إرسال الإجابة";
            });
    });

</script>

</body>
</html>
