<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة رمضان الخير</title>
    <style>
        :root {
            --ramadan-gold: #d4af37;
            --ramadan-light: #f4e3ad;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('webpage.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container {
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            padding: 30px; border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 90%; max-width: 450px; text-align: center; color: white;
        }

        .input-group { text-align: right; margin-bottom: 25px; }

        label {
            display: block; margin-bottom: 15px;
            font-weight: bold; color: var(--ramadan-light); font-size: 1.1rem;
        }

        input[type="text"] {
            width: 100%; padding: 12px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 10px; background: rgba(255, 255, 255, 0.1);
            color: white; box-sizing: border-box; outline: none;
        }

        .mcq-option {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.1); 
            margin-bottom: 12px; padding: 12px;
            border-radius: 10px; cursor: pointer;
            transition: 0.3s; border: 1px solid transparent;
        }

        .mcq-option:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--ramadan-gold);
        }

        .mcq-option input { margin-left: 10px; }

        button {
            background: var(--ramadan-gold);
            color: #0f172a; border: none; padding: 15px;
            width: 100%; border-radius: 8px;
            font-weight: bold; font-size: 1.1rem;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }

        button:hover {
            background: var(--ramadan-light);
            transform: translateY(-2px);
        }

        button:disabled { background: #888; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>فانوس الأسئلة 🌙</h1>
    
    <form id="ramadan-form">
        <div class="input-group">
            <label for="name">الاسم الكريم:</label>
            <input type="text" id="name" name="Username" placeholder="اكتب اسمك هنا..." required>
        </div>

        <div class="input-group">
            <label id="question-label"></label>
            <div id="options-container">
                </div>
        </div>

        <button type="submit" id="submitBtn">إرسال الإجابة</button>
    </form>
    <p id="msg" style="margin-top: 15px; font-weight: bold;"></p>
</div>

<script>
    // 1. مصفوفة الأسئلة السبعة
    const questions = [
        { q: "ما هو الشهر الذي يلي شهر رمضان مباشرة؟", options: ["شوال", "شعبان", "ذو القعدة"] },
        { q: "كم عدد سنوات صيام الرسول ﷺ لرمضان؟", options: ["9 سنوات", "7 سنوات", "10 سنوات"] },
        { q: "في أي سنة هجرية فُرض الصيام على المسلمين؟", options: ["2 هـ", "1 هـ", "3 هـ"] },
        { q: "ما هي الغزوة التي وقعت في 17 رمضان؟", options: ["بدر", "أحد", "الخندق"] },
        { q: "من هو الصحابي الذي لُقب بسيف الله المسلول؟", options: ["خالد بن الوليد", "حمزة بن عبد المطلب", "عمر بن الخطاب"] },
        { q: "أين ورد ذكر ليلة القدر في القرآن الكريم؟", options: ["سورة القدر", "سورة البقرة", "سورة الإخلاص"] },
        { q: "ما هو اسم الباب الذي يدخل منه الصائمون الجنة؟", options: ["الريان", "القدس", "السلام"] }
    ];

    // 2. منطق تبديل السؤال كل 4 أيام
    const startDate = new Date("2026-02-25"); // تاريخ بداية المسابقة
    const today = new Date();
    const diffDays = Math.floor(Math.abs(today - startDate) / (1000 * 60 * 60 * 24));
    const qIndex = Math.floor(diffDays / 4) % questions.length;
    const currentQ = questions[qIndex];

    // عرض السؤال والخيارات في الصفحة
    document.getElementById('question-label').innerText = "سؤال اليوم: " + currentQ.q;
    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = currentQ.options.map(opt => `
        <label class="mcq-option">
            <input type="radio" name="UserAnswer" value="${opt}" required> ${opt}
        </label>
    `).join('');

    // 3. كود ربط الإرسال مع Google Sheets
    // استبدل الرابط أدناه برابط الـ Web App الخاص بك
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyFH8yBD-lwg6n760zbb-8XDRHhQ1u4jx-BWqMRk5vn6oTr4JecdbrIgX-mvKpuGYmW/exec';
    const form = document.getElementById('ramadan-form');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "جاري الإرسال... ✨";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("تم استلام إجابتك بنجاح! رمضان كريم 🌙");
                msg.innerHTML = "✅ تم الإرسال بنجاح!";
                msg.style.color = "#d4af37";
                form.reset();
                btn.disabled = false;
                btn.innerHTML = "إرسال الإجابة";
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("حدث خطأ في الاتصال، حاول مرة أخرى.");
                btn.disabled = false;
                btn.innerHTML = "إرسال الإجابة";
            });
    });
</script>

</body>
</html>
